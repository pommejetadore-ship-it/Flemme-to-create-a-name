<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Grosse Arnaque</title>
<style>
body {
  margin:0;
  padding:0;
  font-family: 'Georgia', serif;
  background: linear-gradient(to bottom, #1a1a1a, #333);
  color: #fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}

.logo {
  font-size:48px;
  font-weight:bold;
  color: gold;
  text-shadow: 2px 2px 0 #000, 4px 4px 0 #555;
  margin-bottom:50px;
}

h1,h2,p {
  margin:0;
}

button {
  margin: 15px;
  padding: 15px 25px;
  font-size:18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:gold;
  color:#000;
  font-weight:bold;
  box-shadow:2px 2px 5px #000;
  transition: transform 0.2s;
}

button:hover {
  transform: scale(1.05);
  background: #ffd700;
}

#content {
  display:none; /* caché au départ, on affichera après 10s */
  flex-direction:column;
  align-items:center;
}
</style>
</head>
<body>

<div id="intro">
  <h1>Grosse Arnaque</h1>
  <h2>Vente de cerveaux en ligne</h2>
  <p>PDG : Pablo L’Escroc, disciple d’Elise Ingels</p>
</div>

<div id="content">
  <div class="logo">🧠 Grosse Arnaque</div>
  <button onclick="location.href='client.html'">Les commentaires des clients</button>
  <button onclick="location.href='emploi.html'">Mode d'emploi</button>
  <button onclick="location.href='cerveau.html'">Cerveaux à vendre</button>
</div>

<script>
// Après 10 secondes, cacher l'intro et afficher le vrai site
setTimeout(() => {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('content').style.display = 'flex';
}, 10000);
</script>

</body>
</html>

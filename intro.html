<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Grosse Arnaque</title>
<style>
/* Corps de page */
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(to bottom, #1a1a1a, #333);
  font-family: 'Georgia', serif;
  color: #fff;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
}

/* Titre principal */
h1 {
  font-size: 80px;
  font-weight: bold;
  color: gold;
  text-shadow:
    2px 2px 0 #000,
    4px 4px 0 #555;
  margin: 0;
  animation: fadeIn 2s ease-out;
}

/* Sous-titre */
h2 {
  font-size: 32px;
  font-style: italic;
  color: #ffd700;
  text-shadow: 1px 1px 2px #000;
  margin-top: 20px;
  animation: fadeIn 3s ease-out;
}

/* Texte en petit */
p {
  font-size: 18px;
  color: #eee;
  margin-top: 10px;
  font-style: normal;
  animation: fadeIn 4s ease-out;
}

/* Animations douces */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(-20px);}
  to {opacity: 1; transform: translateY(0);}
}

</style>
</head>
<body>

<h1>Grosse Arnaque</h1>
<h2>Vente de cerveaux en ligne</h2>
<p>PDG : Pablo L’Escroc, disciple d’Elise Ingels</p>

</body>
</html>

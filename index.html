<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vérification CAPTCHA</title>

<style>
body{
  font-family: Arial, sans-serif;
  text-align: center;
  background:#f0f0f0;
}

h1{
  margin-top:40px;
}

.grid{
  display:grid;
  grid-template-columns: repeat(3,150px);
  gap:15px;
  justify-content:center;
  margin-top:30px;
}

.grid img{
  width:150px;
  height:150px;
  object-fit:cover;
  border:3px solid #ccc;
  cursor:pointer;
}

.grid img:hover{
  border-color:#4285f4;
}

#result{
  margin-top:30px;
  font-size:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>Vérification que vous n'êtes pas un robot</h1>
<p>Cliquez sur toutes les images contenant <b>Jakob Lorber</b></p>

<div class="grid">

<img src="https://picsum.photos/200?1" onclick="wrong()">
<img src="https://picsum.photos/200?2" onclick="wrong()">
<img src="https://picsum.photos/200?3" onclick="wrong()">

<img src="https://picsum.photos/200?4" onclick="wrong()">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/2d/Toaster.jpg" onclick="toaster()">
<img src="https://picsum.photos/200?6" onclick="wrong()">

<img src="https://picsum.photos/200?7" onclick="wrong()">
<img src="https://picsum.photos/200?8" onclick="wrong()">
<img src="https://picsum.photos/200?9" onclick="wrong()">

</div>

<div id="result"></div>

<script>

function wrong(){
  document.getElementById("result").innerText =
  "Image incorrecte. Jakob Lorber n'est pas ici.";
}

function toaster(){
  document.getElementById("result").innerText =
  "Effectivement, Jakob Lorber s'est réincarné en grille-pain.";
}

</script>

</body>
</html>

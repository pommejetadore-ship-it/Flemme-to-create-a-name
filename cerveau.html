<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cerveaux à vendre</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f2f2f2;
text-align:center;
margin:0;
}

section{
margin-top:60px;
}

button{
padding:12px 22px;
font-size:16px;
margin:8px;
cursor:pointer;
background:#222;
color:white;
border:none;
border-radius:6px;
}

button:hover{
background:#444;
}

#loading,#shop,#order{
display:none;
}

input{
padding:10px;
margin:6px;
}

.code{
width:35px;
text-align:center;
font-size:18px;
}

#final{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
font-size:90px;
align-items:center;
justify-content:center;
opacity:1;
transition:opacity 4s;
}

</style>
</head>

<body>

<section id="start">
<h1>Cerveaux à vendre</h1>
<button onclick="startShop()">Acheter un cerveau</button>
</section>


<section id="loading">
<p>Connexion au réseau neuronal...</p>
<p>Analyse de votre cerveau...</p>
<p>Chargement du catalogue...</p>
</section>


<section id="shop">

<p><b>Plus le prix est élevé, plus le cerveau est performant</b></p>

<button onclick="chooseBrain()">Cerveau 1 - 15€</button>
<button onclick="chooseBrain()">Cerveau 2 - 30€</button>
<button onclick="chooseBrain()">Cerveau 3 - 60€</button>
<button onclick="chooseBrain()">Cerveau 4 - 120€</button>
<button onclick="chooseBrain()">Cerveau 5 - 240€</button>
<button onclick="chooseBrain()">Cerveau 6 - 67000€</button>
<button onclick="chooseBrain()">Cerveau 7 - 67000000€</button>

</section>


<section id="order">

<h2>Informations de livraison</h2>

<input placeholder="Adresse"><br>
<input placeholder="Ville"><br>
<input placeholder="Pays ou planète"><br>

<h3>Code de votre carte bancaire</h3>

<div>

<input class="code" maxlength="1">
<input class="code" maxlength="1">
<input class="code" maxlength="1">
<input class="code" maxlength="1">

<input class="code" maxlength="1">
<input class="code" maxlength="1">
<input class="code" maxlength="1">
<input class="code" maxlength="1">

<input class="code" maxlength="1">
<input class="code" maxlength="1">
<input class="code" maxlength="1">
<input class="code" maxlength="1">

<input class="code" maxlength="1">
<input class="code" maxlength="1">
<input class="code" maxlength="1">
<input class="code" maxlength="1">

</div>


<button onclick="finish()">Valider la commande</button>

</section>


<div id="final">MERCI.</div>


<script>

function startShop(){

document.getElementById("start").style.display="none"
document.getElementById("loading").style.display="block"

setTimeout(function(){

document.getElementById("loading").style.display="none"
document.getElementById("shop").style.display="block"

},2000)

}


function chooseBrain(){

document.getElementById("shop").style.display="none"
document.getElementById("order").style.display="block"

}


function finish(){

document.body.style.background="black"

document.getElementById("order").style.display="none"

let final=document.getElementById("final")
final.style.display="flex"

setTimeout(function(){
final.style.opacity="0"
},2000)

}

</script>

</body>
</html>
